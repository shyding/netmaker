name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

env:
  GO_VERSION: '1.25.3'
  NODE_VERSION: '17'

jobs:
  # 步骤 1：检测目录变动
  changes:
    runs-on: ubuntu-latest
    outputs:
      netclient: ${{ steps.filter.outputs.netclient }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            netclient:
              - 'netclient/**'
              - 'models/**'
              - 'logic/**'
            backend:
              - 'netmaker/**'
              - 'models/**'
              - 'logic/**'
              - 'database/**'
              - 'server/**'
              - 'go.mod'
              - 'go.sum'
            frontend:
              - 'netmaker-ui/**'

  # 步骤 2.1：编译客户端（如果需要）
  build-netclient:
    needs: changes
    if: needs.changes.outputs.netclient == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: netclient-linux-amd64
          - goos: linux
            goarch: arm64
            name: netclient-linux-arm64
          - goos: linux
            goarch: arm
            name: netclient-linux-arm
          - goos: windows
            goarch: amd64
            name: netclient-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            name: netclient-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: netclient-darwin-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: 'netclient/go.sum'

      - name: Build ${{ matrix.name }}
        run: |
          cd netclient
          go mod download
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ${{ matrix.name }} .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: netclient-${{ matrix.goos }}-${{ matrix.goarch }}
          path: netclient/${{ matrix.name }}
          retention-days: 1

  # 步骤 2.2：编译后端（如果需要）
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: 'netmaker/go.sum'

      - name: Build Backend
        run: |
          cd netmaker
          go mod download
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o netmaker-linux .

      - name: Upload Backend
        uses: actions/upload-artifact@v4
        with:
          name: netmaker-backend
          path: |
            netmaker/netmaker-linux
            netmaker/config/
          retention-days: 1

  # 步骤 2.3：编译前端（如果需要）
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'netmaker-ui/package-lock.json'

      - name: Build Frontend
        run: |
          cd netmaker-ui
          npm ci
          export NODE_OPTIONS="--openssl-legacy-provider"
          npm run build
          tar -czf frontend-build.tar.gz build/

      - name: Upload Frontend
        uses: actions/upload-artifact@v4
        with:
          name: netmaker-frontend
          path: netmaker-ui/frontend-build.tar.gz
          retention-days: 1

  # 步骤 3：部署到 VPS（串联等待构建完成）
  deploy:
    needs: [changes, build-backend, build-frontend]
    # 只要后端或前端至少有一个需要部署，就执行
    if: always() && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Download Backend Artifact
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: netmaker-backend
          path: deploy-package/netmaker/

      - name: Download Frontend Artifact
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: netmaker-frontend
          path: deploy-package/

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "deploy-package/*"
          target: "/tmp/netmaker-deploy"
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          UPDATE_FRONTEND: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
          UPDATE_BACKEND: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: UPDATE_FRONTEND,UPDATE_BACKEND
          script: |
            set -e
            INSTALL_DIR="/opt/netmaker"
            FRONTEND_DIR="/var/www/netmaker"

            echo "=== 创建目录 (若不存在) ==="
            sudo mkdir -p $INSTALL_DIR/config
            sudo mkdir -p $FRONTEND_DIR
            sudo mkdir -p /var/log/netmaker

            # ---------------- 部署后端 ----------------
            if [ "$UPDATE_BACKEND" = "true" ]; then
              echo "=== 部署后端 ==="
              sudo systemctl stop netmaker || true
              sudo cp /tmp/netmaker-deploy/netmaker/netmaker-linux $INSTALL_DIR/netmaker
              sudo chmod +x $INSTALL_DIR/netmaker
              
              if [ -d "/tmp/netmaker-deploy/netmaker/config" ]; then
                sudo cp -r /tmp/netmaker-deploy/netmaker/config/* $INSTALL_DIR/config/ || true
              fi

              sudo tee $INSTALL_DIR/server.env > /dev/null <<EOF
              SERVER_HOST=0.0.0.0
              API_PORT=8081
              MASTER_KEY=${{ secrets.NETMAKER_MASTER_KEY }}
              DATABASE=sqlite
              SQL_CONN=$INSTALL_DIR/netmaker.db
              CORS_ALLOWED_ORIGIN=${{ secrets.CORS_ORIGIN }}
              SERVER_HTTP_HOST=${{ secrets.BACKEND_URL }}
EOF

              sudo tee /etc/systemd/system/netmaker.service > /dev/null <<'EOF'
              [Unit]
              Description=Netmaker Server
              After=network.target

              [Service]
              Type=simple
              User=root
              WorkingDirectory=/opt/netmaker
              EnvironmentFile=/opt/netmaker/server.env
              ExecStart=/opt/netmaker/netmaker
              Restart=always
              RestartSec=10
              StandardOutput=append:/var/log/netmaker/netmaker.log
              StandardError=append:/var/log/netmaker/netmaker-error.log

              NoNewPrivileges=true
              PrivateTmp=true

              [Install]
              WantedBy=multi-user.target
EOF
              sudo systemctl daemon-reload
              sudo systemctl enable netmaker
              sudo systemctl start netmaker
              echo "✅ 后端已重启"
            else
              echo "⏩ 后端无需更新"
            fi

            # ---------------- 部署前端 ----------------
            if [ "$UPDATE_FRONTEND" = "true" ]; then
              echo "=== 部署前端 ==="
              cd /tmp/netmaker-deploy
              tar -xzf frontend-build.tar.gz
              sudo cp -R build/* $FRONTEND_DIR/
              
              sudo tee $FRONTEND_DIR/config.js > /dev/null <<EOF
              window.REACT_APP_BACKEND = "${{ secrets.BACKEND_URL }}";
EOF

              sudo tee /etc/nginx/sites-available/netmaker > /dev/null <<'EOF'
              server {
                  listen 8888;
                  server_name ${{ secrets.DOMAIN_NAME }};

                  location / {
                      root /var/www/netmaker;
                      try_files $uri $uri/ /index.html;
                      add_header Cache-Control "no-cache";
                  }

                  location /downloads {
                      root /var/www/netmaker;
                      autoindex on;
                      autoindex_exact_size off;
                      autoindex_localtime on;
                      add_header Content-Disposition "attachment";
                  }

                  location /api {
                      proxy_pass http://localhost:8081;
                      proxy_set_header Host $host;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto $scheme;
                  }
              }
EOF
              sudo ln -sf /etc/nginx/sites-available/netmaker /etc/nginx/sites-enabled/netmaker
              if ! grep -q "include /etc/nginx/sites-enabled/\*;" /etc/nginx/nginx.conf; then
                sudo sed -i '/http {/a \    include /etc/nginx/sites-enabled/*;' /etc/nginx/nginx.conf
              fi
              sudo nginx -t && sudo systemctl reload nginx || echo "Nginx 配置有误"
              echo "✅ 前端已更新"
            else
              echo "⏩ 前端无需更新"
            fi

            echo "=== 清理临时文件 ==="
            rm -rf /tmp/netmaker-deploy

      - name: Health Check
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "等待后端服务启动..."
          sleep 5
          curl -f ${{ secrets.BACKEND_URL }}/api/server/health || echo "健康检查失败"

  # 步骤 4：客户端归档部署 (如果需要)
  deploy-netclient:
    needs: [changes, build-netclient]
    if: always() && (needs.changes.outputs.netclient == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Download all Netclient binaries
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: netclient-*
          path: downloads/
          merge-multiple: true

      - name: Package binaries
        continue-on-error: true
        run: |
          if [ -d "downloads" ] && [ "$(ls -A downloads)" ]; then
            cd downloads
            sha256sum * > checksums.txt
            cd ..
            tar -czf netclient-downloads.tar.gz downloads/
          fi

      - name: Deploy Netclient to VPS
        if: hashFiles('netclient-downloads.tar.gz') != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "netclient-downloads.tar.gz"
          target: "/tmp/"

      - name: Extract on VPS
        if: hashFiles('netclient-downloads.tar.gz') != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            if [ -f "/tmp/netclient-downloads.tar.gz" ]; then
              sudo mkdir -p /var/www/netmaker/downloads
              cd /tmp
              tar -xzf netclient-downloads.tar.gz
              sudo mv downloads/* /var/www/netmaker/downloads/
              sudo chmod 644 /var/www/netmaker/downloads/*
              rm -rf downloads netclient-downloads.tar.gz
            fi
