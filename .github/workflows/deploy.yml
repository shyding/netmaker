name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # 允许手动触发

env:
  GO_VERSION: '1.25.3'
  NODE_VERSION: '17'

jobs:
  # 客户端编译 - 并行执行，失败不影响部署
  build-netclient:
    runs-on: ubuntu-latest
    continue-on-error: true  # 失败不影响整个 workflow
    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: netclient-linux-amd64
          - goos: linux
            goarch: arm64
            name: netclient-linux-arm64
          - goos: linux
            goarch: arm
            name: netclient-linux-arm
          - goos: windows
            goarch: amd64
            name: netclient-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            name: netclient-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: netclient-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check Netclient changes
        id: check-changes
        run: |
          NETCLIENT_COMMIT=$(git log -1 --format=%H -- netclient/)
          echo "commit=$NETCLIENT_COMMIT" >> $GITHUB_OUTPUT
          echo "Last netclient commit: $NETCLIENT_COMMIT"

      - name: Cache binary
        id: cache
        uses: actions/cache@v4
        with:
          path: netclient/${{ matrix.name }}
          key: netclient-${{ matrix.goos }}-${{ matrix.goarch }}-${{ steps.check-changes.outputs.commit }}

      - name: Build ${{ matrix.name }}
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd netclient
          go mod download
          echo "Building ${{ matrix.name }}..."
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ${{ matrix.name }} .
          ls -lh ${{ matrix.name }}
          echo "✅ ${{ matrix.name }} built successfully"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: netclient-${{ matrix.goos }}-${{ matrix.goarch }}
          path: netclient/${{ matrix.name }}
          retention-days: 1

  # 服务端部署 - 独立执行，不等待客户端
  deploy-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Backend
        run: |
          cd netmaker
          go mod download
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o netmaker-linux .

      - name: Build Frontend
        run: |
          cd netmaker-ui
          npm ci
          export NODE_OPTIONS="--openssl-legacy-provider"
          npm run build
          tar -czf frontend-build.tar.gz build/

      - name: Prepare deployment package
        run: |
          mkdir -p deploy-package
          cp netmaker/netmaker-linux deploy-package/
          cp netmaker-ui/frontend-build.tar.gz deploy-package/
          cp -r netmaker/config deploy-package/ || true

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "deploy-package/*"
          target: "/tmp/netmaker-deploy"
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # 定义安装目录
            INSTALL_DIR="/opt/netmaker"
            FRONTEND_DIR="/var/www/netmaker"

            echo "=== 停止现有服务 ==="
            sudo systemctl stop netmaker || true
            sudo systemctl stop netmaker-ui || true

            echo "=== 创建目录 ==="
            sudo mkdir -p $INSTALL_DIR
            sudo mkdir -p $FRONTEND_DIR
            sudo mkdir -p $INSTALL_DIR/config
            sudo mkdir -p /var/log/netmaker

            echo "=== 部署后端 ==="
            sudo cp /tmp/netmaker-deploy/netmaker-linux $INSTALL_DIR/netmaker
            sudo chmod +x $INSTALL_DIR/netmaker

            # 复制配置文件（如果存在）
            if [ -d "/tmp/netmaker-deploy/config" ]; then
              sudo cp -r /tmp/netmaker-deploy/config/* $INSTALL_DIR/config/
            fi

            echo "=== 部署前端 ==="
            cd /tmp/netmaker-deploy
            tar -xzf frontend-build.tar.gz
            sudo cp -r build/* $FRONTEND_DIR/

            # 生成前端配置
            sudo tee $FRONTEND_DIR/config.js > /dev/null <<EOF
            window.REACT_APP_BACKEND = "${{ secrets.BACKEND_URL }}";
            EOF

            echo "=== 创建后端配置文件 ==="
            sudo tee $INSTALL_DIR/server.env > /dev/null <<EOF
            SERVER_HOST=0.0.0.0
            API_PORT=8081
            MASTER_KEY=${{ secrets.NETMAKER_MASTER_KEY }}
            DATABASE=sqlite
            SQL_CONN=$INSTALL_DIR/netmaker.db
            CORS_ALLOWED_ORIGIN=${{ secrets.CORS_ORIGIN }}
            SERVER_HTTP_HOST=${{ secrets.BACKEND_URL }}
            EOF

            echo "=== 创建 systemd 服务文件 ==="

            # 后端服务
            sudo tee /etc/systemd/system/netmaker.service > /dev/null <<'EOF'
            [Unit]
            Description=Netmaker Server
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/opt/netmaker
            EnvironmentFile=/opt/netmaker/server.env
            ExecStart=/opt/netmaker/netmaker
            Restart=always
            RestartSec=10
            StandardOutput=append:/var/log/netmaker/netmaker.log
            StandardError=append:/var/log/netmaker/netmaker-error.log

            # 安全设置
            NoNewPrivileges=true
            PrivateTmp=true

            [Install]
            WantedBy=multi-user.target
            EOF

            # 前端服务（使用 Nginx）
            echo "=== 配置 Nginx ==="
            # 创建 sites-available 和 sites-enabled 目录（如果不存在）
            sudo mkdir -p /etc/nginx/sites-available
            sudo mkdir -p /etc/nginx/sites-enabled

            sudo tee /etc/nginx/sites-available/netmaker > /dev/null <<'EOF'
            server {
                listen 8888;
                server_name ${{ secrets.DOMAIN_NAME }};

                # 前端
                location / {
                    root /var/www/netmaker;
                    try_files $uri $uri/ /index.html;
                    add_header Cache-Control "no-cache";
                }

                # Netclient 下载
                location /downloads {
                    root /var/www/netmaker;
                    autoindex on;
                    autoindex_exact_size off;
                    autoindex_localtime on;
                    add_header Content-Disposition "attachment";
                }

                # 后端 API
                location /api {
                    proxy_pass http://localhost:8081;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            EOF

            # 启用 Nginx 站点
            sudo ln -sf /etc/nginx/sites-available/netmaker /etc/nginx/sites-enabled/netmaker

            # 确保 nginx.conf 包含 sites-enabled
            if ! grep -q "include /etc/nginx/sites-enabled/\*;" /etc/nginx/nginx.conf; then
              sudo sed -i '/http {/a \    include /etc/nginx/sites-enabled/*;' /etc/nginx/nginx.conf
            fi

            sudo nginx -t && sudo systemctl reload nginx || echo "Nginx 配置有误，请检查"

            echo "=== 重新加载 systemd ==="
            sudo systemctl daemon-reload

            echo "=== 启动服务 ==="
            sudo systemctl enable netmaker
            sudo systemctl start netmaker

            echo "=== 检查服务状态 ==="
            sudo systemctl status netmaker --no-pager || true

            echo "=== 清理临时文件 ==="
            rm -rf /tmp/netmaker-deploy

            echo "=== 部署完成 ==="
            echo "后端服务: http://localhost:8081"
            echo "前端访问: http://${{ secrets.DOMAIN_NAME }}:8888"
            echo ""
            echo "查看日志:"
            echo "  sudo journalctl -u netmaker -f"
            echo "  sudo tail -f /var/log/netmaker/netmaker.log"

      - name: Health Check
        run: |
          echo "等待服务启动..."
          sleep 10

          # 检查后端健康状态
          curl -f ${{ secrets.BACKEND_URL }}/api/server/health || echo "健康检查失败，请手动检查"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 服务端部署成功！"
            echo "前端: http://${{ secrets.DOMAIN_NAME }}:8888"
            echo "后端: ${{ secrets.BACKEND_URL }}"
          else
            echo "❌ 服务端部署失败，请检查日志"
          fi

  # 部署客户端二进制文件 - 在客户端编译完成后执行
  deploy-netclient:
    runs-on: ubuntu-latest
    needs: build-netclient
    if: always()  # 即使编译失败也执行，尝试部署可用的二进制文件

    steps:
      - name: Download all Netclient binaries
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: netclient-*
          path: downloads/
          merge-multiple: true

      - name: Generate checksums
        continue-on-error: true
        run: |
          if [ -d "downloads" ] && [ "$(ls -A downloads)" ]; then
            cd downloads
            sha256sum * > checksums.txt
            echo "✅ Checksums generated"
            echo "Available binaries:"
            ls -lh
            cd ..
          else
            echo "⚠️ No netclient binaries found"
            exit 0
          fi

      - name: Package binaries
        continue-on-error: true
        run: |
          if [ -d "downloads" ] && [ "$(ls -A downloads)" ]; then
            tar -czf netclient-downloads.tar.gz downloads/
            echo "✅ Binaries packaged"
          fi

      - name: Deploy Netclient binaries to VPS
        if: hashFiles('netclient-downloads.tar.gz') != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "netclient-downloads.tar.gz"
          target: "/tmp/"

      - name: Extract and deploy on VPS
        if: hashFiles('netclient-downloads.tar.gz') != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            if [ -f "/tmp/netclient-downloads.tar.gz" ]; then
              echo "=== 部署 Netclient 下载文件 ==="
              sudo mkdir -p /var/www/netmaker/downloads
              cd /tmp
              tar -xzf netclient-downloads.tar.gz
              sudo cp -r downloads/* /var/www/netmaker/downloads/
              sudo chmod 644 /var/www/netmaker/downloads/*
              rm -rf downloads netclient-downloads.tar.gz
              echo "✅ Netclient binaries deployed"
              echo "Available at: http://${{ secrets.DOMAIN_NAME }}:8888/downloads/"
              ls -lh /var/www/netmaker/downloads/
            else
              echo "⚠️ No netclient binaries to deploy"
            fi
